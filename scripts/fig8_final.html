<!DOCTYPE html>
<html>
<head>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
    background: #f9f7f4;
    padding: 28px 36px 20px;
    width: 920px;
  }
  .fig-header {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2.5px;
    color: #7a6b5d;
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  .chart-area {
    position: relative;
    width: 840px;
    height: 420px;
  }
  svg.main-chart {
    width: 840px;
    height: 420px;
  }
  .metrics-bar {
    display: flex;
    margin-top: 14px;
    border-top: 1px solid #e0dbd5;
    padding-top: 12px;
    gap: 0;
  }
  .metric-item {
    flex: 1;
    text-align: center;
    border-right: 1px solid #e8e4de;
    padding: 0 10px;
  }
  .metric-item:last-child { border-right: none; }
  .metric-item .metric-title {
    font-size: 11px;
    font-weight: 700;
    color: #2c2a27;
    margin-bottom: 2px;
  }
  .metric-item .metric-desc {
    font-size: 9px;
    color: #8c8578;
  }
</style>
</head>
<body>
<div class="fig-header">Training Pressure Response Curve</div>

<div class="chart-area">
  <svg class="main-chart" viewBox="0 0 840 420">
    <defs>
      <linearGradient id="curveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#1b3a5c"/>
        <stop offset="60%" stop-color="#4a6d8c"/>
        <stop offset="100%" stop-color="#a0aeb8"/>
      </linearGradient>
      <linearGradient id="zoneHomeo" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#eaf4ed" stop-opacity="0.35"/>
        <stop offset="100%" stop-color="#eaf4ed" stop-opacity="0.05"/>
      </linearGradient>
      <linearGradient id="zoneBound" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#fdf6e3" stop-opacity="0.45"/>
        <stop offset="100%" stop-color="#fdf6e3" stop-opacity="0.1"/>
      </linearGradient>
      <linearGradient id="zoneDegrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#fce8e6" stop-opacity="0.4"/>
        <stop offset="100%" stop-color="#fce8e6" stop-opacity="0.08"/>
      </linearGradient>
    </defs>

    <!-- Plot area: x=70..800, y=25..360 -->
    <!-- Zone backgrounds -->
    <rect x="70" y="25" width="260" height="335" fill="url(#zoneHomeo)"/>
    <rect x="330" y="25" width="210" height="335" fill="url(#zoneBound)"/>
    <rect x="540" y="25" width="260" height="335" fill="url(#zoneDegrad)"/>

    <!-- Subtle grid lines -->
    <g stroke="#e8e3dc" stroke-width="0.4" opacity="0.6">
      <line x1="70" y1="100" x2="800" y2="100"/>
      <line x1="70" y1="175" x2="800" y2="175"/>
      <line x1="70" y1="250" x2="800" y2="250"/>
      <line x1="70" y1="325" x2="800" y2="325"/>
    </g>

    <!-- Y-axis -->
    <text x="62" y="32" text-anchor="end" font-size="8.5" fill="#8c8578" font-family="Inter, sans-serif">high</text>
    <text x="62" y="358" text-anchor="end" font-size="8.5" fill="#8c8578" font-family="Inter, sans-serif">low</text>
    <text x="16" y="195" text-anchor="middle" font-size="9.5" fill="#5a5347" font-family="Inter, sans-serif" font-weight="600" transform="rotate(-90, 16, 195)">MODEL FIDELITY (K&#8320; RETENTION)</text>

    <!-- Threshold lines (very subtle) -->
    <line x1="330" y1="25" x2="330" y2="360" stroke="#b5443b" stroke-width="0.8" stroke-dasharray="4,5" opacity="0.5"/>
    <line x1="540" y1="25" x2="540" y2="360" stroke="#b5443b" stroke-width="0.8" stroke-dasharray="4,5" opacity="0.5"/>

    <!-- Threshold label (small, at top) -->
    <text x="435" y="18" text-anchor="middle" font-size="8" fill="#b5443b" font-family="Inter, sans-serif" font-weight="600" font-style="italic">regime transitions (backbone-dependent)</text>

    <!-- Main response curve: sigmoid/logistic shape - flat then drops -->
    <path d="M 80,52
             C 120,50 180,48 240,50
             C 280,52 310,56 330,68
             C 355,82 380,110 420,155
             C 460,200 500,240 540,272
             C 580,300 630,320 700,335
             C 740,342 770,346 795,348"
          fill="none" stroke="url(#curveGrad)" stroke-width="2.8" stroke-linecap="round"/>

    <!-- Data points on curve -->
    <circle cx="200" cy="49" r="5.5" fill="#1a7a3a" stroke="#fff" stroke-width="1.8"/>
    <circle cx="435" cy="162" r="5.5" fill="#b8860b" stroke="#fff" stroke-width="1.8"/>
    <circle cx="680" cy="332" r="5.5" fill="#b5443b" stroke="#fff" stroke-width="1.8"/>

    <!-- X-axis -->
    <line x1="70" y1="360" x2="800" y2="360" stroke="#d4cfc8" stroke-width="0.8"/>

    <!-- Zone labels -->
    <text x="200" y="385" text-anchor="middle" font-size="12.5" fill="#1b3a5c" font-family="Inter, sans-serif" font-weight="700">Homeostatic</text>
    <text x="200" y="400" text-anchor="middle" font-size="8" fill="#8c8578" font-family="Inter, sans-serif">retention &gt;90% &middot; distribution stable</text>

    <text x="435" y="385" text-anchor="middle" font-size="12.5" fill="#9a7520" font-family="Inter, sans-serif" font-weight="700">Bounded</text>
    <text x="435" y="400" text-anchor="middle" font-size="8" fill="#8c8578" font-family="Inter, sans-serif">retention stable &middot; distribution drifts</text>

    <text x="670" y="385" text-anchor="middle" font-size="12.5" fill="#b5443b" font-family="Inter, sans-serif" font-weight="700">Degradative</text>
    <text x="670" y="400" text-anchor="middle" font-size="8" fill="#8c8578" font-family="Inter, sans-serif">retention declines &middot; drifts markedly</text>

    <!-- X-axis title -->
    <text x="435" y="418" text-anchor="middle" font-size="9.5" fill="#5a5347" font-family="Inter, sans-serif" font-weight="600">EFFECTIVE TRAINING PRESSURE &#8594;</text>

    <!-- Axis ends -->
    <text x="75" y="373" font-size="8" fill="#8c8578" font-family="Inter, sans-serif">low</text>
    <text x="790" y="373" text-anchor="end" font-size="8" fill="#8c8578" font-family="Inter, sans-serif">high</text>
  </svg>
</div>

<!-- Bottom metrics bar -->
<div class="metrics-bar">
  <div class="metric-item">
    <div class="metric-title">K&#8320; Retention</div>
    <div class="metric-desc">knowledge preserved</div>
  </div>
  <div class="metric-item">
    <div class="metric-title">Content Efficiency</div>
    <div class="metric-desc">signal per token</div>
  </div>
  <div class="metric-item">
    <div class="metric-title">Response Persistence</div>
    <div class="metric-desc">behavioral stability</div>
  </div>
  <div class="metric-item">
    <div class="metric-title">Output Length Drift</div>
    <div class="metric-desc">response length change</div>
  </div>
</div>
</body>
</html>
