<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Inter, Arial, sans-serif;
    background: #ffffff;
    margin: 0;
    padding: 32px;
    width: 780px;
    color: #17202a;
  }
  .container {
    background: #ffffff;
    border: 1px solid #e3e7ec;
    border-radius: 14px;
    padding: 36px 32px;
    box-shadow: 0 12px 32px rgba(20, 31, 43, 0.08);
  }
</style>
</head>
<body>
<div class="container">
  <svg id="diagram"></svg>
</div>

<script>
const W = 700;
const MARGIN = { left: 16, right: 16 };
const USABLE = W - MARGIN.left - MARGIN.right;

// Layout Y positions
const Y = {
  sectionLabel: 20,
  components: 56,
  componentsH: 72,
  arrow1Top: 140,
  arrow1Bot: 168,
  pill: 180,
  pillH: 48,
  arrow2Top: 240,
  arrow2Bot: 268,
  threshold: 284,
  thresholdLine: 300,
  regimes: 326,
  regimesH: 108,
  arrow3Top: 446,
  arrow3Bot: 474,
  signatures: 486,
  signaturesH: 60
};

const TOTAL_H = Y.signatures + Y.signaturesH + 20;

const svg = d3.select("#diagram")
  .attr("width", W)
  .attr("height", TOTAL_H)
  .attr("xmlns", "http://www.w3.org/2000/svg");

// Arrow marker definition
const defs = svg.append("defs");

defs.append("marker")
  .attr("id", "arrowhead")
  .attr("markerWidth", 10)
  .attr("markerHeight", 7)
  .attr("refX", 10)
  .attr("refY", 3.5)
  .attr("orient", "auto")
  .append("polygon")
  .attr("points", "0 0, 10 3.5, 0 7")
  .attr("fill", "#8291a1");

// Gradient for pill
const grad = defs.append("linearGradient")
  .attr("id", "pillGrad")
  .attr("x1", "0%").attr("y1", "0%")
  .attr("x2", "100%").attr("y2", "100%");
grad.append("stop").attr("offset", "0%").attr("stop-color", "#243447");
grad.append("stop").attr("offset", "100%").attr("stop-color", "#34495e");

// Helper: draw arrow
function drawArrow(x, y1, y2) {
  svg.append("path")
    .attr("d", `M ${x} ${y1} L ${x} ${y2}`)
    .attr("stroke", "#8291a1")
    .attr("stroke-width", 2)
    .attr("fill", "none")
    .attr("marker-end", "url(#arrowhead)");
}

// Section label
svg.append("text")
  .attr("x", W / 2)
  .attr("y", Y.sectionLabel)
  .attr("text-anchor", "middle")
  .attr("font-size", "11px")
  .attr("font-weight", "800")
  .attr("fill", "#607080")
  .attr("letter-spacing", "1.8px")
  .text("PRESSURE COMPONENTS");

// Component boxes
const components = [
  { title: "Adapter Rank", subtitle: "Update Capacity" },
  { title: "Learning Rate", subtitle: "Perturbation Magnitude" },
  { title: "Training Examples", subtitle: "Synthetic Exposure" }
];

const boxW = 195;
const boxGap = 18;
const totalBoxW = boxW * 3 + boxGap * 2;
const boxStartX = (W - totalBoxW) / 2;

components.forEach((c, i) => {
  const x = boxStartX + i * (boxW + boxGap);
  const y = Y.components;
  const g = svg.append("g");

  // Shadow filter
  if (i === 0) {
    const filter = defs.append("filter").attr("id", "boxShadow")
      .attr("x", "-10%").attr("y", "-10%").attr("width", "130%").attr("height", "140%");
    filter.append("feDropShadow")
      .attr("dx", "0").attr("dy", "4").attr("stdDeviation", "6")
      .attr("flood-color", "rgba(20,31,43,0.05)");
  }

  g.append("rect")
    .attr("x", x).attr("y", y)
    .attr("width", boxW).attr("height", Y.componentsH)
    .attr("rx", 10).attr("ry", 10)
    .attr("fill", "#ffffff")
    .attr("stroke", "#d9e0e7")
    .attr("stroke-width", 1)
    .attr("filter", "url(#boxShadow)");

  g.append("text")
    .attr("x", x + boxW / 2).attr("y", y + 26)
    .attr("text-anchor", "middle")
    .attr("font-size", "11px")
    .attr("font-weight", "600")
    .attr("fill", "#6d7a88")
    .text(c.subtitle);

  g.append("text")
    .attr("x", x + boxW / 2).attr("y", y + 50)
    .attr("text-anchor", "middle")
    .attr("font-size", "15px")
    .attr("font-weight", "800")
    .attr("fill", "#14202b")
    .text(c.title);
});

// Arrow 1: components -> pill
drawArrow(W / 2, Y.arrow1Top, Y.arrow1Bot);

// Pill: Effective Training Pressure
const pillW = 360;
const pillH = Y.pillH;
const pillX = (W - pillW) / 2;
const pillY = Y.pill;

// Pill shadow
const pillFilter = defs.append("filter").attr("id", "pillShadow")
  .attr("x", "-10%").attr("y", "-20%").attr("width", "120%").attr("height", "160%");
pillFilter.append("feDropShadow")
  .attr("dx", "0").attr("dy", "8").attr("stdDeviation", "9")
  .attr("flood-color", "rgba(44,62,80,0.22)");

svg.append("rect")
  .attr("x", pillX).attr("y", pillY)
  .attr("width", pillW).attr("height", pillH)
  .attr("rx", pillH / 2).attr("ry", pillH / 2)
  .attr("fill", "url(#pillGrad)")
  .attr("filter", "url(#pillShadow)");

svg.append("text")
  .attr("x", W / 2).attr("y", pillY + pillH / 2 + 6)
  .attr("text-anchor", "middle")
  .attr("font-size", "16px")
  .attr("font-weight", "800")
  .attr("fill", "#ffffff")
  .text("Effective Training Pressure");

// Arrow 2: pill -> threshold
drawArrow(W / 2, Y.arrow2Top, Y.arrow2Bot);

// Threshold label
svg.append("text")
  .attr("x", W / 2).attr("y", Y.threshold)
  .attr("text-anchor", "middle")
  .attr("font-size", "11px")
  .attr("font-weight", "800")
  .attr("fill", "#c0392b")
  .attr("letter-spacing", "1.4px")
  .text("BACKBONE-DEPENDENT THRESHOLD");

// Dashed threshold line
const lineX1 = 40;
const lineX2 = W - 40;
svg.append("line")
  .attr("x1", lineX1).attr("y1", Y.thresholdLine)
  .attr("x2", lineX2).attr("y2", Y.thresholdLine)
  .attr("stroke", "#c0392b")
  .attr("stroke-width", 2.5)
  .attr("stroke-dasharray", "14 10")
  .attr("opacity", 0.85);

// Regime boxes
const regimes = [
  {
    name: "Homeostatic", bg: "#eef8f1", border: "#9bd3aa", titleColor: "#146c36", descColor: "#245b36",
    lines: ["Retention >90%", "Distribution stable", "Low pressure"]
  },
  {
    name: "Bounded", bg: "#fff8e6", border: "#e2c56c", titleColor: "#8a6500", descColor: "#6c5310",
    lines: ["Retention stable", "Distribution drifts", "Intermediate"]
  },
  {
    name: "Degradative", bg: "#fff0f1", border: "#e4a2a8", titleColor: "#9d222f", descColor: "#743039",
    lines: ["Retention declines", "Distribution drifts", "High pressure"]
  }
];

const regBoxW = 200;
const regGap = 18;
const totalRegW = regBoxW * 3 + regGap * 2;
const regStartX = (W - totalRegW) / 2;

// Regime shadow filter
const regFilter = defs.append("filter").attr("id", "regShadow")
  .attr("x", "-5%").attr("y", "-5%").attr("width", "115%").attr("height", "130%");
regFilter.append("feDropShadow")
  .attr("dx", "0").attr("dy", "5").attr("stdDeviation", "7")
  .attr("flood-color", "rgba(20,31,43,0.06)");

regimes.forEach((r, i) => {
  const x = regStartX + i * (regBoxW + regGap);
  const y = Y.regimes;
  const h = Y.regimesH;

  svg.append("rect")
    .attr("x", x).attr("y", y)
    .attr("width", regBoxW).attr("height", h)
    .attr("rx", 10).attr("ry", 10)
    .attr("fill", r.bg)
    .attr("stroke", r.border)
    .attr("stroke-width", 1)
    .attr("filter", "url(#regShadow)");

  svg.append("text")
    .attr("x", x + regBoxW / 2).attr("y", y + 26)
    .attr("text-anchor", "middle")
    .attr("font-size", "15px")
    .attr("font-weight", "850")
    .attr("fill", r.titleColor)
    .text(r.name);

  r.lines.forEach((line, li) => {
    svg.append("text")
      .attr("x", x + regBoxW / 2).attr("y", y + 50 + li * 18)
      .attr("text-anchor", "middle")
      .attr("font-size", "12px")
      .attr("font-weight", "600")
      .attr("fill", r.descColor)
      .text(line);
  });
});

// Arrow 3: regimes -> signatures
drawArrow(W / 2, Y.arrow3Top, Y.arrow3Bot);

// Observable Signatures box
const sigW = USABLE * 0.92;
const sigX = (W - sigW) / 2;
const sigY = Y.signatures;
const sigH = Y.signaturesH;

svg.append("rect")
  .attr("x", sigX).attr("y", sigY)
  .attr("width", sigW).attr("height", sigH)
  .attr("rx", 10).attr("ry", 10)
  .attr("fill", "#f8fafc")
  .attr("stroke", "#d6dde5")
  .attr("stroke-width", 1);

svg.append("text")
  .attr("x", W / 2).attr("y", sigY + 22)
  .attr("text-anchor", "middle")
  .attr("font-size", "12px")
  .attr("font-weight", "850")
  .attr("fill", "#2f3b46")
  .text("Observable Signatures");

svg.append("text")
  .attr("x", W / 2).attr("y", sigY + 44)
  .attr("text-anchor", "middle")
  .attr("font-size", "12px")
  .attr("font-weight", "650")
  .attr("fill", "#536171")
  .text("K₀ retention  |  Content efficiency  |  Response persistence  |  Output length drift");

</script>
</body>
</html>
