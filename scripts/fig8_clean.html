<!DOCTYPE html>
<html>
<head>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
    background: white;
    padding: 0;
    width: 780px;
  }
</style>
</head>
<body>
<svg viewBox="0 0 720 400" width="720" height="400">
  <defs>
    <linearGradient id="curveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1b3a5c"/>
      <stop offset="55%" stop-color="#3d6b8c"/>
      <stop offset="100%" stop-color="#7a9bb0"/>
    </linearGradient>
  </defs>

  <!-- Zone backgrounds (soft, meaningful colors) -->
  <rect x="60" y="20" width="225" height="310" fill="#e8f5e9" opacity="0.5"/>
  <rect x="285" y="20" width="185" height="310" fill="#fff8e1" opacity="0.55"/>
  <rect x="470" y="20" width="230" height="310" fill="#ffebee" opacity="0.5"/>

  <!-- Subtle grid -->
  <g stroke="#e0e0e0" stroke-width="0.5">
    <line x1="60" y1="95" x2="700" y2="95"/>
    <line x1="60" y1="170" x2="700" y2="170"/>
    <line x1="60" y1="245" x2="700" y2="245"/>
  </g>

  <!-- Threshold lines -->
  <line x1="285" y1="20" x2="285" y2="330" stroke="#c62828" stroke-width="0.9" stroke-dasharray="5,5" opacity="0.4"/>
  <line x1="470" y1="20" x2="470" y2="330" stroke="#c62828" stroke-width="0.9" stroke-dasharray="5,5" opacity="0.4"/>

  <!-- Main curve -->
  <path d="M 70,48
           C 120,45 180,44 230,46
           C 265,48 280,54 300,70
           C 325,92 360,135 395,175
           C 430,215 460,248 490,270
           C 525,290 575,305 635,312
           C 660,315 680,317 695,318"
        fill="none" stroke="url(#curveGrad)" stroke-width="3" stroke-linecap="round"/>

  <!-- Data points -->
  <circle cx="185" cy="45" r="6" fill="#2e7d32" stroke="white" stroke-width="2"/>
  <circle cx="390" cy="170" r="6" fill="#f9a825" stroke="white" stroke-width="2"/>
  <circle cx="615" cy="308" r="6" fill="#c62828" stroke="white" stroke-width="2"/>

  <!-- X-axis -->
  <line x1="60" y1="330" x2="700" y2="330" stroke="#bdbdbd" stroke-width="0.8"/>

  <!-- Y-axis label -->
  <text x="18" y="180" text-anchor="middle" font-size="13" fill="#333" font-family="Inter, sans-serif" font-weight="600" transform="rotate(-90, 18, 180)">K&#8320; Retention</text>
  <text x="50" y="30" text-anchor="end" font-size="10" fill="#666" font-family="Inter, sans-serif">high</text>
  <text x="50" y="328" text-anchor="end" font-size="10" fill="#666" font-family="Inter, sans-serif">low</text>

  <!-- X-axis label -->
  <text x="380" y="385" text-anchor="middle" font-size="13" fill="#333" font-family="Inter, sans-serif" font-weight="600">Effective Training Pressure</text>
  <text x="65" y="348" font-size="10" fill="#666" font-family="Inter, sans-serif">low</text>
  <text x="693" y="348" text-anchor="end" font-size="10" fill="#666" font-family="Inter, sans-serif">high</text>

  <!-- Regime names -->
  <text x="172" y="365" text-anchor="middle" font-size="14" fill="#2e7d32" font-family="Inter, sans-serif" font-weight="700">Homeostatic</text>
  <text x="377" y="365" text-anchor="middle" font-size="14" fill="#f57f17" font-family="Inter, sans-serif" font-weight="700">Bounded</text>
  <text x="585" y="365" text-anchor="middle" font-size="14" fill="#c62828" font-family="Inter, sans-serif" font-weight="700">Degradative</text>
</svg>
</body>
</html>
