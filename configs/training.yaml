lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]
  task_type: CAUSAL_LM

training:
  learning_rate: 1.0e-5
  num_epochs: 2
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  warmup_ratio: 0.05
  weight_decay: 0.01
  bf16: true
  max_seq_length: 512

experiment:
  num_generations: 10
  seeds: [42, 137, 256]
  groups: ["replacement", "real_only", "accumulation"]
  generation_temperature: 0.7
